name: Weekly Maintenance

on:
  schedule:
    # Run every Monday at 3:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run maintenance tasks
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          LOG_LEVEL: INFO
        run: |
          echo "Running weekly maintenance..."
          python -m src.reports.monthly_report
          echo "Maintenance complete"

      - name: Commit maintenance report
        run: |
          git config --local user.email "radar-bot@opensourceradar.dev"
          git config --local user.name "Open Source Radar Bot"
          git add reports/ data/metrics.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: weekly maintenance $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
